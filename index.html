<!DOCTYPE html>
<html>

<head>

<title>Trova l'animale diverso</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.grid{

display:grid;
grid-template-columns:repeat(6,60px);
gap:10px;
justify-content:center;
margin-top:25px;

}

.cell{

width:60px;
height:60px;

font-size:30px;

display:flex;
align-items:center;
justify-content:center;

background:#333;

border-radius:8px;

cursor:pointer;

}

.info{
margin-top:10px;
font-size:18px;
}

button{

margin-top:15px;
padding:10px 20px;
font-size:16px;

}

</style>

</head>

<body>

<h1>🐾 Trova l'animale diverso</h1>

<div class="info">
⏱ Tempo: <span id="time">0</span>s
</div>

<div class="info">
🏆 Record livello: <span id="record">0</span>
</div>

<div class="info">
📈 Livello: <span id="level">1</span>
</div>

<div class="grid" id="grid"></div>

<p id="msg"></p>

<button onclick="restart()">Ricomincia</button>

<script>

let animals=["🐶","🐱","🐰","🐸","🐼","🐯","🐵","🦊"]

let level=1

let record=localStorage.getItem("record") || 0

let time=0
let timer=null

document.getElementById("record").innerText=record

startGame()

function startGame(){

startTimer()

createLevel()

}

function startTimer(){

clearInterval(timer)

time=0

document.getElementById("time").innerText=time

timer=setInterval(()=>{

time++

document.getElementById("time").innerText=time

},1000)

}

function createLevel(){

let grid=document.getElementById("grid")

grid.innerHTML=""

document.getElementById("level").innerText=level

let base=animals[Math.floor(Math.random()*animals.length)]

let diff=animals[Math.floor(Math.random()*animals.length)]

while(diff===base){

diff=animals[Math.floor(Math.random()*animals.length)]

}

let total=30+level*3

let diffPos=Math.floor(Math.random()*total)

for(let i=0;i<total;i++){

let div=document.createElement("div")

div.className="cell"

if(i===diffPos){

div.innerText=diff
div.onclick=win

}else{

div.innerText=base
div.onclick=lose

}

grid.appendChild(div)

}

}

function win(){

document.getElementById("msg").innerText="🔥 Livello completato!"

if(level>record){

record=level
localStorage.setItem("record",record)

document.getElementById("record").innerText=record

}

level++

setTimeout(createLevel,700)

}

function lose(){

document.getElementById("msg").innerText="❌ Sbagliato!"

}

function restart(){

level=1

startGame()

document.getElementById("msg").innerText=""

}

</script>

</body>

</html>
