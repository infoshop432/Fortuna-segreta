<!DOCTYPE html>
<html>
<head>

<title>Jackpot Segreto</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ffb300;
}

.grid{
display:grid;
grid-template-columns:repeat(3,110px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.box{
width:110px;
height:110px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
border:2px solid #444;
}

button{
margin-top:25px;
padding:12px 20px;
font-size:16px;
background:#ffb300;
border:none;
cursor:pointer;
}

.jackpot{
font-size:28px;
margin-top:10px;
color:#00ff9d;
}

.players{
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<h1>Jackpot Segreto</h1>

<p class="players" id="players"></p>

<div class="jackpot">
💰 Jackpot: <span id="jackpot">500</span> €
</div>

<p>Trova 3 simboli uguali</p>

<div class="grid" id="grid"></div>

<p id="msg"></p>

<button onclick="bonus()">
🔥 Sblocca altri tentativi 1€
</button>

<script>

let attempts=3
let opened=[]

let symbols=["💎","💎","💰","💰","🍀","🍀","⭐","⭐","❌"]

let grid=document.getElementById("grid")

symbols.sort(()=>Math.random()-0.5)

symbols.forEach((s)=>{

let div=document.createElement("div")

div.className="box"

div.onclick=()=>openBox(div,s)

grid.appendChild(div)

})

function openBox(div,s){

if(attempts<=0)return
if(div.innerHTML!="")return

div.innerHTML=s
opened.push(s)
attempts--

check()

}

function check(){

if(opened.length==3){

if(opened[0]==opened[1] && opened[1]==opened[2]){

msg("INCREDIBILE! Hai trovato 3 simboli!")

}else{

msg("Quasi! Riprova...")

}

setTimeout(reset,2000)

}

}

function reset(){

opened=[]
attempts=2

let boxes=document.querySelectorAll(".box")

boxes.forEach((b)=>b.innerHTML="")

msg("")

}

function msg(t){

document.getElementById("msg").innerText=t

}

function bonus(){

window.open("https://ko-fi.com/peccatinascosti","_blank")

}

let jackpot=500

setInterval(()=>{

jackpot+=Math.floor(Math.random()*5)

document.getElementById("jackpot").innerText=jackpot

},3000)

function fakePlayers(){

let n=120+Math.floor(Math.random()*80)

document.getElementById("players").innerText=n+" giocatori online"

}

setInterval(fakePlayers,4000)

fakePlayers()

</script>

</body>
</html>
