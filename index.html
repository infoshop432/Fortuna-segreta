<!DOCTYPE html>
<html>
<head>

<title>Animal Memory Challenge</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
margin-top:20px;
}

.info{
margin-top:10px;
font-size:18px;
}

.grid{

display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:25px;

}

.card{

width:80px;
height:80px;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
background:#4CAF50;
color:white;
cursor:pointer;
border-radius:8px;

}

.card.open{
background:white;
color:black;
}

button{

margin-top:15px;
padding:10px 18px;
font-size:16px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Animal Memory 🧩</h1>

<div class="info">
⏱ Tempo: <span id="time">0</span>s
</div>

<div class="info">
🏆 Record: <span id="record">-</span>
</div>

<div class="grid" id="grid"></div>

<p id="msg"></p>

<button onclick="restart()">🔄 Rigioca</button>

<script>

let animals=["🐶","🐱","🐸","🐵","🐰","🐼","🦊","🐯"]

let cards=[...animals,...animals]

let first=null
let second=null
let lock=false
let matches=0

let time=0
let timer=null

let record=localStorage.getItem("record")

if(record){
document.getElementById("record").innerText=record+"s"
}

startGame()

function startGame(){

cards.sort(()=>Math.random()-0.5)

let grid=document.getElementById("grid")

grid.innerHTML=""

matches=0

cards.forEach(a=>{

let div=document.createElement("div")

div.className="card"

div.innerText="?"

div.dataset.animal=a

div.onclick=()=>flip(div)

grid.appendChild(div)

})

time=0

document.getElementById("time").innerText=time

clearInterval(timer)

timer=setInterval(()=>{

time++

document.getElementById("time").innerText=time

},1000)

}

function flip(card){

if(lock || card.classList.contains("open")) return

card.innerText=card.dataset.animal

card.classList.add("open")

if(!first){

first=card

return

}

second=card

lock=true

if(first.dataset.animal===second.dataset.animal){

matches++

reset()

if(matches===8){

clearInterval(timer)

document.getElementById("msg").innerText="🎉 Puzzle completato!"

saveRecord()

}

}else{

setTimeout(()=>{

first.innerText="?"
second.innerText="?"

first.classList.remove("open")
second.classList.remove("open")

reset()

},700)

}

}

function reset(){

first=null
second=null
lock=false

}

function restart(){

startGame()

document.getElementById("msg").innerText=""

}

function saveRecord(){

if(!record || time<record){

localStorage.setItem("record",time)

document.getElementById("record").innerText=time+"s"

}

}

</script>

</body>

</html>
