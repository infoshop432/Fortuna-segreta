<!DOCTYPE html>
<html>

<head>

<title>Ruota del Jackpot</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ffb300;
}

#wheel{

width:250px;
height:250px;
border-radius:50%;
border:10px solid #333;
margin:auto;
margin-top:30px;

background:conic-gradient(
#ff5252 0deg 60deg,
#ffb300 60deg 120deg,
#4caf50 120deg 180deg,
#2196f3 180deg 240deg,
#9c27b0 240deg 300deg,
#f44336 300deg 360deg
);

transition:transform 4s ease-out;

}

button{

margin-top:30px;
padding:12px 25px;
font-size:18px;
background:#ffb300;
border:none;
cursor:pointer;

}

.jackpot{

font-size:28px;
margin-top:15px;
color:#00ff9d;

}

.players{

color:#aaa;
font-size:14px;

}

</style>

</head>

<body>

<h1>Ruota del Jackpot</h1>

<p class="players" id="players"></p>

<div class="jackpot">

💰 Jackpot: <span id="jackpot">500</span> €

</div>

<div id="wheel"></div>

<p id="msg"></p>

<button onclick="spin()">
🎰 Gira la ruota
</button>

<br>

<button onclick="bonus()">
🔥 Sblocca altri giri 1€
</button>

<script>

let spins=1
let wheel=document.getElementById("wheel")

function spin(){

if(spins<=0){

msg("Hai finito i giri gratis")

return

}

spins--

let random=Math.floor(Math.random()*360)+720

wheel.style.transform="rotate("+random+"deg)"

setTimeout(result,4000)

}

function result(){

let outcomes=[
"Riprova",
"Quasi!",
"Riprova",
"Vicino!",
"Riprova",
"Jackpot mancato!"
]

let r=outcomes[Math.floor(Math.random()*outcomes.length)]

msg(r)

}

function msg(t){

document.getElementById("msg").innerText=t

}

function bonus(){

window.open("https://ko-fi.com/peccatinascosti","_blank")

}

let jackpot=500

setInterval(()=>{

jackpot+=Math.floor(Math.random()*10)

document.getElementById("jackpot").innerText=jackpot

},3000)

function fakePlayers(){

let n=150+Math.floor(Math.random()*120)

document.getElementById("players").innerText=n+" giocatori online"

}

setInterval(fakePlayers,4000)

fakePlayers()

</script>

</body>

</html>
