<!DOCTYPE html>
<html>

<head>

<title>Super Jackpot Slot</title>

<style>

body{
background:#070707;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ffb300;
}

.jackpot{
font-size:36px;
color:#00ff9d;
margin-top:10px;
}

.bar{
width:280px;
height:18px;
background:#333;
margin:auto;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:#ffb300;
}

.slot{
display:flex;
justify-content:center;
gap:12px;
margin-top:40px;
}

.reel{
width:70px;
height:80px;
font-size:40px;
background:#1e1e1e;
display:flex;
align-items:center;
justify-content:center;
border:3px solid #444;
}

button{
margin-top:25px;
padding:14px 28px;
font-size:18px;
background:#ffb300;
border:none;
cursor:pointer;
}

.players{
font-size:14px;
color:#aaa;
}

.popup{

position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:12px;
border:1px solid #333;
font-size:14px;

}

.win{
animation:flash 0.4s infinite;
}

@keyframes flash{
0%{background:#1e1e1e}
50%{background:#ffb300}
100%{background:#1e1e1e}
}

</style>

</head>

<body>

<h1>Super Jackpot Slot</h1>

<p class="players" id="players"></p>

<div class="jackpot">
💰 Jackpot: <span id="jackpot">987</span> €
</div>

<div class="bar">
<div class="progress" id="luck"></div>
</div>

<div class="slot">

<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
<div class="reel" id="r4">❔</div>
<div class="reel" id="r5">❔</div>

</div>

<p id="msg"></p>

<button onclick="spin()">
🎰 Gira la Slot
</button>

<br>

<button onclick="bonus()">
🎰 Sblocca altri giri (1€)
</button>

<div class="popup" id="popup"></div>

<script>

let spins=1
let luck=0

let symbols=["💎","💰","⭐","🍀","🔔","7️⃣"]

function spin(){

if(spins<=0){

msg("Hai finito i giri gratis")

return

}

spins--

spinReel("r1",1000)
spinReel("r2",1500)
spinReel("r3",2000)
spinReel("r4",2500)
spinReel("r5",3000)

luck+=20

updateLuck()

setTimeout(result,3100)

}

function spinReel(id,time){

let reel=document.getElementById(id)

let interval=setInterval(()=>{

reel.innerText=randomSymbol()

},100)

setTimeout(()=>{

clearInterval(interval)

reel.innerText=randomSymbol()

},time)

}

function randomSymbol(){

return symbols[Math.floor(Math.random()*symbols.length)]

}

function result(){

let reels=[

r1.innerText,
r2.innerText,
r3.innerText,
r4.innerText,
r5.innerText

]

let win=reels.every(v=>v===reels[0])

if(win){

msg("🎉 JACKPOT!")

document.querySelectorAll(".reel").forEach(r=>r.classList.add("win"))

}else{

if(Math.random()<0.6){

msg("🔥 Quasi jackpot!")

}else{

msg("Quasi! Riprova...")

}

}

}

function msg(t){

document.getElementById("msg").innerText=t

}

function bonus(){

window.open("https://py.pl/NgwlYzmOBdKPXNEvL5zfjA","_blank")

}

function updateLuck(){

document.getElementById("luck").style.width=luck+"%"

}

let jackpot=987

setInterval(()=>{

jackpot+=Math.floor(Math.random()*15)

document.getElementById("jackpot").innerText=jackpot

},3000)

function fakePlayers(){

let n=120+Math.floor(Math.random()*250)

document.getElementById("players").innerText=n+" giocatori online"

}

setInterval(fakePlayers,4000)

fakePlayers()

let names=["Marco","Luca","Sara","Giulia","Andrea","Paolo","Anna"]

function fakeWin(){

let name=names[Math.floor(Math.random()*names.length)]

let amount=10+Math.floor(Math.random()*50)

document.getElementById("popup").innerText=name+" ha vinto "+amount+"€"

}

setInterval(fakeWin,7000)

</script>

</body>

</html>
